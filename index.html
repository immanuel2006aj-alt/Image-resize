<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Image Optimizer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>AI Image Optimizer</h1>

<div class="drop-zone" id="dropZone">
  <p>Drag & Drop or Click to Upload</p>
  <input type="file" id="upload" multiple accept="image/*">
</div>

<div id="previewContainer"></div>

<div class="controls">

<label>Resize (%)</label>
<input type="range" id="resize" min="10" max="100" value="100">

<label>Quality (%)</label>
<input type="range" id="quality" min="10" max="100" value="80">

<label>Target Size (KB)</label>
<input type="number" id="targetSize" placeholder="Optional">

<label>Format</label>
<select id="format">
  <option value="image/jpeg">JPG</option>
  <option value="image/png">PNG</option>
  <option value="image/webp">WEBP</option>
</select>
</div>
<label>Target Size Range</label>

<div class="range-group">
  <select id="minSize">
    <option value="10">10 KB</option>
    <option value="50">50 KB</option>
    <option value="100">100 KB</option>
    <option value="500">500 KB</option>
    <option value="1024">1 MB</option>
  </select>

  <span>to</span>

  <select id="maxSize">
    <option value="100">100 KB</option>
    <option value="500">500 KB</option>
    <option value="1024">1 MB</option>
    <option value="2048">2 MB</option>
    <option value="5120">5 MB</option>
  </select>
</div>

<div class="buttons">
<div id="resultContainer"></div>
<button onclick="processAll()">Optimize</button>
<button onclick="toggleDark()">🌙</button>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
